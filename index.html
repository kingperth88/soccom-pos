<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCA | Premium POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7fa; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .tab-active { background: #1e293b; color: white; shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .product-card:active { transform: scale(0.95); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app" class="flex flex-col h-screen max-w-md mx-auto bg-white shadow-2xl overflow-hidden relative">
        
        <header class="glass sticky top-0 z-30 px-6 py-4 flex justify-between items-center border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i class="fa-solid fa- shop text-white text-lg"></i>
                </div>
                <div>
                    <h1 id="brand-name" class="font-extrabold text-slate-900 leading-none">SOCCOM STORE</h1>
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Live Terminal</span>
                </div>
            </div>
            <button id="mode-toggle" onclick="handleModeSwitch()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-xs font-bold hover:bg-slate-200 transition-all">
                <i class="fa-solid fa-user-shield mr-2"></i>Manager
            </button>
        </header>

        <main id="screen-seller" class="flex-1 flex flex-col overflow-hidden animate-in fade-in duration-300">
            <div class="p-4 bg-slate-50/50">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-300"></i>
                    <input type="text" id="search-input" oninput="renderSellerProducts()" placeholder="Search products..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">
                </div>
            </div>

            <div id="seller-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-4">
                </div>

            <div class="p-4 bg-white border-t border-slate-100 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                <button onclick="toggleCartDrawer()" class="w-full bg-slate-900 text-white h-16 rounded-2xl flex items-center justify-between px-6 shadow-xl active:scale-95 transition-transform">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <i class="fa-solid fa-basket-shopping text-xl"></i>
                            <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-indigo-500 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-slate-900">0</span>
                        </div>
                        <span class="font-bold">View Cart</span>
                    </div>
                    <span id="cart-total-display" class="text-xl font-black">₱0.00</span>
                </button>
            </div>
        </main>

        <main id="screen-manager" class="hidden flex-1 flex flex-col overflow-hidden bg-slate-50 animate-in slide-in-from-right duration-300">
            <div class="flex p-2 bg-white border-b border-slate-100 gap-1">
                <button onclick="showManagerTab('sales')" id="tab-sales" class="flex-1 py-2.5 rounded-xl text-xs font-bold tab-active">Sales</button>
                <button onclick="showManagerTab('inventory')" id="tab-inventory" class="flex-1 py-2.5 rounded-xl text-xs font-bold text-slate-400">Items</button>
                <button onclick="showManagerTab('settings')" id="tab-settings" class="flex-1 py-2.5 rounded-xl text-xs font-bold text-slate-400">Setup</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4">
                <div id="view-sales" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Revenue</p>
                            <h3 id="stat-revenue" class="text-2xl font-black text-indigo-600 mt-1">₱0.00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Invoices</p>
                            <h3 id="stat-count" class="text-2xl font-black text-slate-900 mt-1">0</h3>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                        <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">Top Performance</h4>
                        <div id="sales-list" class="space-y-4 text-sm font-medium"></div>
                    </div>
                </div>

                <div id="view-inventory" class="hidden space-y-4">
                    <button onclick="openProductModal()" class="w-full py-4 bg-white border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold text-xs hover:border-indigo-400 hover:text-indigo-500 transition-all">
                        <i class="fa-solid fa-circle-plus mr-2"></i>Add New Merchandise
                    </button>
                    <div id="inventory-list" class="space-y-3"></div>
                </div>

                <div id="view-settings" class="hidden space-y-4">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">Security</h4>
                        <label class="block text-xs font-semibold text-slate-600 mb-2">Change Manager PIN</label>
                        <input type="password" id="new-pin" maxlength="4" placeholder="••••" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-center font-mono text-xl mb-3">
                        <button onclick="saveNewPin()" class="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-bold text-sm">Update PIN</button>
                    </div>
                    <button onclick="clearAllData()" class="w-full py-4 text-rose-500 font-bold text-xs uppercase tracking-widest">Factory Reset System</button>
                </div>
            </div>
        </main>

        <div id="cart-drawer" class="hidden fixed inset-0 z-40">
            <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleCartDrawer()"></div>
            <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] max-h-[85vh] flex flex-col shadow-2xl animate-in slide-in-from-bottom duration-300">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto my-4"></div>
                <div class="px-8 pb-4 flex justify-between items-center">
                    <h3 class="text-xl font-extrabold">Your Basket</h3>
                    <button onclick="toggleCartDrawer()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="cart-items-container" class="flex-1 overflow-y-auto px-8 py-2 divide-y divide-slate-50"></div>
                <div class="p-8 bg-slate-50 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400 font-bold uppercase text-xs">Grand Total</span>
                        <span id="drawer-total" class="text-3xl font-black text-indigo-600">₱0.00</span>
                    </div>
                    <div class="flex gap-4">
                        <input type="number" id="cash-input" placeholder="Cash Amount" class="flex-1 p-4 bg-white border border-slate-200 rounded-2xl font-bold text-lg outline-none focus:border-indigo-500">
                        <button onclick="processCheckout()" class="bg-slate-900 text-white px-8 rounded-2xl font-bold">Pay</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md">
            <div class="bg-white w-full max-w-xs rounded-[40px] p-8 shadow-2xl text-center space-y-6">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center text-2xl mx-auto shadow-inner">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div>
                    <h3 class="text-xl font-black">Manager Login</h3>
                    <p class="text-slate-400 text-xs font-medium mt-1">Enter 4-digit security PIN</p>
                </div>
                <div id="pin-dots" class="flex justify-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-slate-200"></div>
                    <div class="w-3 h-3 rounded-full bg-slate-200"></div>
                    <div class="w-3 h-3 rounded-full bg-slate-200"></div>
                    <div class="w-3 h-3 rounded-full bg-slate-200"></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="typePin(1)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">1</button>
                    <button onclick="typePin(2)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">2</button>
                    <button onclick="typePin(3)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">3</button>
                    <button onclick="typePin(4)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">4</button>
                    <button onclick="typePin(5)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">5</button>
                    <button onclick="typePin(6)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">6</button>
                    <button onclick="typePin(7)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">7</button>
                    <button onclick="typePin(8)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">8</button>
                    <button onclick="typePin(9)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">9</button>
                    <button onclick="cancelAuth()" class="h-14 text-rose-500 font-bold text-xs">Exit</button>
                    <button onclick="typePin(0)" class="h-14 bg-slate-50 rounded-2xl font-bold text-xl active:bg-slate-200">0</button>
                    <button onclick="clearPin()" class="h-14 text-slate-400"><i class="fa-solid fa-delete-left"></i></button>
                </div>
            </div>
        </div>

        <div id="product-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
            <div class="bg-white w-full rounded-[32px] p-8 space-y-5 shadow-2xl">
                <h3 class="text-lg font-black text-slate-900">Merchandise Details</h3>
                <input type="hidden" id="edit-id">
                <div class="space-y-4">
                    <input type="text" id="p-name" placeholder="Product Name" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500">
                    <div class="flex gap-4">
                        <input type="number" id="p-price" placeholder="Price (₱)" class="w-1/2 p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="number" id="p-stock" placeholder="Stock" class="w-1/2 p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <input type="text" id="p-img" placeholder="Image URL (Optional)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex gap-3">
                    <button onclick="closeProductModal()" class="flex-1 py-4 font-bold text-slate-400">Cancel</button>
                    <button onclick="saveProduct()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black">Save Item</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDlK5D6GWP9S6GAbwOX7VNqn9jDPhf-zHw",
            authDomain: "soccom-a5ab4.firebaseapp.com",
            projectId: "soccom-a5ab4",
            storageBucket: "soccom-a5ab4.firebasestorage.app",
            messagingSenderId: "952366972491",
            appId: "1:952366972491:web:7844bfd108fd06971857ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let cart = {};
        let sales = { totalRevenue: 0, totalSalesCount: 0, itemsBreakdown: {} };
        let currentPin = "1234";
        let enteredPin = "";
        let isManager = false;

        // REAL-TIME LISTENERS
        onSnapshot(collection(db, "products"), (snap) => {
            products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderSellerProducts();
            renderInventory();
        });

        onSnapshot(doc(db, "sales", "summary"), (d) => {
            if (d.exists()) { sales = d.data(); renderSales(); }
        });

        onSnapshot(doc(db, "settings", "config"), (d) => {
            if (d.exists()) currentPin = d.data().pin || "1234";
        });

        // SCREEN LOGIC
        window.handleModeSwitch = () => {
            if (isManager) {
                isManager = false;
                document.getElementById('screen-manager').classList.add('hidden');
                document.getElementById('screen-seller').classList.remove('hidden');
                document.getElementById('mode-toggle').innerHTML = `<i class="fa-solid fa-user-shield mr-2"></i>Manager`;
            } else {
                document.getElementById('auth-modal').classList.remove('hidden');
                enteredPin = "";
                updatePinDots();
            }
        };

        window.typePin = (num) => {
            if (enteredPin.length < 4) {
                enteredPin += num;
                updatePinDots();
                if (enteredPin.length === 4) {
                    if (enteredPin === currentPin) {
                        isManager = true;
                        document.getElementById('auth-modal').classList.add('hidden');
                        document.getElementById('screen-seller').classList.add('hidden');
                        document.getElementById('screen-manager').classList.remove('hidden');
                        document.getElementById('mode-toggle').innerHTML = `<i class="fa-solid fa-shop mr-2"></i>Store`;
                    } else {
                        alert("Access Denied");
                        enteredPin = "";
                        updatePinDots();
                    }
                }
            }
        };

        function updatePinDots() {
            const dots = document.getElementById('pin-dots').children;
            for (let i = 0; i < 4; i++) {
                dots[i].className = i < enteredPin.length ? "w-3 h-3 rounded-full bg-indigo-600 scale-125 transition-all" : "w-3 h-3 rounded-full bg-slate-200";
            }
        }

        window.clearPin = () => { enteredPin = ""; updatePinDots(); };
        window.cancelAuth = () => { document.getElementById('auth-modal').classList.add('hidden'); };

        window.showManagerTab = (tab) => {
            ['sales', 'inventory', 'settings'].forEach(t => {
                document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`tab-${t}`).className = t === tab ? "flex-1 py-2.5 rounded-xl text-xs font-bold tab-active" : "flex-1 py-2.5 rounded-xl text-xs font-bold text-slate-400";
            });
        };

        // SELLER LOGIC
        window.renderSellerProducts = () => {
            const grid = document.getElementById('seller-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = "";
            products.filter(p => p.name.toLowerCase().includes(search)).forEach(p => {
                const card = document.createElement('div');
                card.className = "product-card bg-white p-4 rounded-[32px] border border-slate-100 shadow-sm flex flex-col items-center text-center gap-2 transition-all active:bg-slate-50";
                card.onclick = () => addToCart(p.id);
                card.innerHTML = `
                    <div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center overflow-hidden">
                        ${p.imageUrl ? `<img src="${p.imageUrl}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-cookie text-indigo-300 text-2xl"></i>`}
                    </div>
                    <h4 class="text-xs font-bold truncate w-full">${p.name}</h4>
                    <span class="text-indigo-600 font-black text-sm">₱${p.price}</span>
                `;
                grid.appendChild(card);
            });
        };

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if (p.stock <= 0) return alert("Sold Out");
            cart[id] = (cart[id] || 0) + 1;
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0, count = 0;
            const container = document.getElementById('cart-items-container');
            container.innerHTML = "";
            for (const [id, qty] of Object.entries(cart)) {
                const p = products.find(x => x.id === id);
                total += p.price * qty;
                count += qty;
                container.innerHTML += `
                    <div class="flex items-center py-4 justify-between">
                        <div>
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-xs text-slate-400">₱${p.price} each</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="updateQty('${id}', -1)" class="w-8 h-8 rounded-full border border-slate-200">-</button>
                            <span class="font-bold text-sm">${qty}</span>
                            <button onclick="updateQty('${id}', 1)" class="w-8 h-8 rounded-full border border-slate-200">+</button>
                        </div>
                    </div>
                `;
            }
            document.getElementById('cart-total-display').innerText = `₱${total.toFixed(2)}`;
            document.getElementById('drawer-total').innerText = `₱${total.toFixed(2)}`;
            document.getElementById('cart-count-badge').innerText = count;
        }

        window.updateQty = (id, delta) => {
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            updateCartUI();
        };

        window.toggleCartDrawer = () => document.getElementById('cart-drawer').classList.toggle('hidden');

        window.processCheckout = async () => {
            const total = parseFloat(document.getElementById('drawer-total').innerText.replace('₱',''));
            const cash = parseFloat(document.getElementById('cash-input').value);
            if (total <= 0 || isNaN(cash) || cash < total) return alert("Invalid Payment");

            for (const [id, qty] of Object.entries(cart)) {
                const p = products.find(x => x.id === id);
                await updateDoc(doc(db, "products", id), { stock: p.stock - qty });
                sales.itemsBreakdown[p.name] = (sales.itemsBreakdown[p.name] || 0) + qty;
            }

            sales.totalRevenue += total;
            sales.totalSalesCount += 1;
            await setDoc(doc(db, "sales", "summary"), sales);
            
            alert(`Success! Change: ₱${(cash - total).toFixed(2)}`);
            cart = {};
            document.getElementById('cash-input').value = "";
            updateCartUI();
            toggleCartDrawer();
        };

        // MANAGER LOGIC
        function renderSales() {
            document.getElementById('stat-revenue').innerText = `₱${sales.totalRevenue.toFixed(2)}`;
            document.getElementById('stat-count').innerText = sales.totalSalesCount;
            const list = document.getElementById('sales-list');
            list.innerHTML = "";
            Object.entries(sales.itemsBreakdown).sort((a,b)=>b[1]-a[1]).forEach(([name, count]) => {
                list.innerHTML += `
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">${name}</span>
                        <span class="bg-slate-50 px-3 py-1 rounded-lg text-indigo-600 font-bold text-xs">${count} sold</span>
                    </div>
                `;
            });
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = "";
            products.forEach(p => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex items-center justify-between border border-slate-100 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center">
                                <i class="fa-solid fa-box text-slate-300"></i>
                            </div>
                            <div>
                                <p class="font-bold text-xs">${p.name}</p>
                                <p class="text-[10px] text-slate-400">₱${p.price} • ${p.stock} in stock</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openProductModal('${p.id}')" class="text-indigo-500 p-2"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteProduct('${p.id}')" class="text-rose-400 p-2"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        window.openProductModal = (id = '') => {
            document.getElementById('product-modal').classList.remove('hidden');
            if (id) {
                const p = products.find(x => x.id === id);
                document.getElementById('edit-id').value = id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-stock').value = p.stock;
                document.getElementById('p-img').value = p.imageUrl || "";
            } else {
                document.getElementById('edit-id').value = "";
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
                document.getElementById('p-stock').value = "";
                document.getElementById('p-img').value = "";
            }
        };

        window.closeProductModal = () => document.getElementById('product-modal').classList.add('hidden');

        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                imageUrl: document.getElementById('p-img').value
            };
            const ref = id ? doc(db, "products", id) : doc(collection(db, "products"));
            await setDoc(ref, data);
            closeProductModal();
        };

        window.deleteProduct = async (id) => { if(confirm("Delete item?")) await deleteDoc(doc(db, "products", id)); };

        window.saveNewPin = async () => {
            const pin = document.getElementById('new-pin').value;
            if(pin.length !== 4) return alert("Must be 4 digits");
            await setDoc(doc(db, "settings", "config"), { pin });
            alert("PIN Updated");
            document.getElementById('new-pin').value = "";
        };

        window.clearAllData = async () => {
            if(confirm("Factory Reset? All sales and items will be deleted.")){
                await setDoc(doc(db, "sales", "summary"), { totalRevenue: 0, totalSalesCount: 0, itemsBreakdown: {} });
                alert("Sales Reset. To delete items, please remove them manually.");
            }
        };
    </script>
</body>
</html>
